<!DOCTYPE html>
<html>
  <head>
    <title>Tile Canvas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" href="assets/icon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.js"></script>
    <script src="scripts/shapes.js"></script>
    <script src="scripts/actions.js"></script>
    <script src="scripts/tools.js"></script>
    <script src="scripts/selection.js"></script>
    <script src="scripts/maker.js"></script>
    <script src="scripts/sketch.js"></script>
  </head>
  <body>
    <main>
      <div id="canvasContainer"></div>
    </main>
    <div id="UI">
      <div class="bar" id="topBar">
        <div class="toolbar">
          <div class="toolbarRow">
            <button onclick="toggleMenu('menu', this)"><img src="assets/menu.png"></button>
            <button id="CROP_Button" onclick="setTool('CROP')"><img src="assets/crop.png"></button>
            <button onclick="undo()"><img src="assets/undo.png"></button>
            <button onclick="redo()"><img src="assets/redo.png"></button>
            <button id="movementControlsButton" class="highlighted" onclick="toggleGrid(this)"><img src="assets/grid.png"></button>
            <button id="gridButton" onclick="toggleMenu('movementControls', this)"><img src="assets/pan.png"></button>
            <button id="layerMenuButton" onclick="toggleMenu('layers', this)"><img src="assets/layers.png"></button>
          </div>
        </div>
        <div class="toolbar extraBar" id="movementControls" style="display:none;">
            <div class="toolbarRow">
              <button oncontextmenu="return false;" id="zoomInButton"><img src="assets/zoom-in.png"></button>
              <button oncontextmenu="return false;" id="zoomOutButton"><img src="assets/zoom-out.png"></button>
              <button oncontextmenu="return false;" id="panLeftButton"><img src="assets/left.png"></button>
              <button oncontextmenu="return false;" id="panRightButton"><img src="assets/right.png"></button>
              <button oncontextmenu="return false;" id="panUpButton"><img src="assets/up.png"></button>
              <button oncontextmenu="return false;" id="panDownButton"><img src="assets/down.png"></button>
            </div>
        </div>
      </div>
      <div id="centerArea">
        <div style="pointer-events: auto;">
          <div id="menu" class="sideMenu" style="display: none;">
            <h3>Tile Canvas</h3>
            <p>Welcome. This is a project I have worked on instead of studying and doing homework. I hope you enjoy it!</p>
            <span>
              Canvas Size: 
              <input class="inlineInput" id="canvasW" type="number" min="8" max="1024" value="16">
              by
              <input class="inlineInput" id="canvasH" type="number" min="8" max="1024" value="16">
              <button class="inlineInput" onclick="setCanvasSize(int(document.getElementById('canvasW').value), int(document.getElementById('canvasH').value))">Apply</button>
            </span>
            <span>
              Tile Resolution:
              <input class="inlineInput" id="tileResolution" type="number" min="8" max="100" value="32">
              <button class="inlineInput" onclick="setResolution(int(document.getElementById('tileResolution').value))">Apply</button>
            </span>
            <span>
              Background Color:
              <input id="canvasBGPicker" type="color">
              <input class="inlineInput" id="canvasBG" type="text" value="#FFFFFF" onclick="this.select()">
              <button class="inlineInput" onclick="setBackgroundColor(document.getElementById('canvasBG').value)">Apply</button>
            </span>
            <span><button class="inlineInput" onclick="newProject();">New Project</button><button class="inlineInput" onclick="loadProject();">Load Project</button></span>
            <span><input class="inlineInput" id="fileName" type="text" value="filename" onclick="this.select()">
              <button onclick="downloadCanvas()">Save as image</button>
              <button onclick="saveProject();">Save as file</button></span>
          </div>
          <div style="background:none;pointer-events: none;flex-grow:1;"></div>
          <div id="toolSettings" class="sideMenu" style="display: none;">
            <h3>Tool Settings</h3>
            <span>
              <span style="width:40%;">Replacement Mode:</span>
              <select id="replacementModeSelect" onchange="setToolOption('REPLACEMENT_MODE', this.value)">
                <option value="IDENTICAL">Identical</option>
                <option value="ALL">All</option>
                <option value="NONE">None</option>
              </select>
            </span>
            <span>
              <span style="width:40%;">Drag Mode:</span>
              <select id="placementModeSelect" onchange="setToolOption('DRAG_MODE', this.value)">
                <option value="AREA">Area</option>
                <option value="DRAW">Draw</option>
              </select>
            </span>
            <span>
              <span style="width:40%;">Selection Mode:</span>
              <select id="selectionModeSelect" onchange="setToolOption('SELECTION_MODE', this.value)">
                <option value="CONTAIN">Contain</option>
                <option value="OVERLAP">Overlap</option>
              </select>
            </span>
          </div>
        </div>
        <div style="pointer-events: auto;">
          <div id="layers" class="sideMenu" style="display: none;">
            <h3>Layers</h3>
            <div id="layerDisplay"></div>
            <button onclick="addLayer()">New</button>
          </div>
          <div id="layerSettings" class="sideMenu" style="display: none;">
            <h4>Layer Settings</h4>
            <span>Name: <input class="inlineInput" type="text" id="layerNameInput" onclick="this.select()"></span>
            <span>Scale: <input type="range" min="-2" max="2" value="0" id="layerScaleRange"></span>
            <span>X Offset: <input class="inlineInput" id="layerOffsetXCheckbox" type="checkbox"></span>
            <span>Y Offset: <input class="inlineInput" id="layerOffsetYCheckbox" type="checkbox"></span>
            <button id="layerRemoveButton">Remove Layer</button>
          </div>
          <div style="background:none;flex-grow:1;"></div>
          <div id="paletteSettings" class="sideMenu" style="display: none;">
            <h3>Palette</h3>
            <span>
              <input id="paletteTextInput" class="inlineInput" type="text" value="hex codes here" onclick="this.select()">
              <button onclick="loadColorsFromString(document.getElementById('paletteTextInput').value)">Load New</button>
              <button onclick="loadColors(defaultPalette)">Reset</button>
            </span>
            <div id="paletteButtons"></div>
            <span>
              <input type="color" id="newColorPicker" value="#ff0000">
              <input class="inlineInput" id="newColorText" type="text" value="#ffffff" onclick="this.select()">
              <button onclick="addColor(document.getElementById('newColorText').value)"><img src="assets/plus.png"></button>
            </span>
          </div>
        </div>
      </div>
      <div class="bar" id="bottomBar">
        <div class="toolbar">
          <div class="toolbarRow">
            <button onclick="toggleMenu('toolSettings', this)"><img src="assets/gear.png"></button>
            <button class="shapeButton" id="RECT_Button" onclick="setTool('RECT')"><img src="assets/square.png"></button>
            <button class="shapeButton" id="WEDGE_Button" onclick="setTool('WEDGE')"><img src="assets/wedge.png"></button>
            <!-- <button class="shapeButton" id="ELLIPSE_Button" onclick="setTool('ELLIPSE')"><img src="assets/circle.png"></button> -->
            <button class="shapeButton" id="QUADRANT_Button" onclick="setTool('QUADRANT')"><img src="assets/quadrant.png"></button>
            <button class="shapeButton" id="INVERSE_QUADRANT_Button" onclick="setTool('INVERSE_QUADRANT')"><img src="assets/inverse-quadrant.png"></button>
            <button class="shapeButton" id="BEZIER_WEDGE_Button" onclick="setTool('BEZIER_WEDGE')"><img src="assets/bezier-wedge.png"></button>
            <button class="shapeButton" id="LINE_Button" onclick="setTool('LINE')"><img src="assets/line.png"></button>
            <button class="shapeButton" id="CURVE_Button" onclick="setTool('CURVE')"><img src="assets/curve.png"></button>
            <button id="ERASE_Button" onclick="setTool('ERASE')"><img src="assets/erase.png"></button>
            <button id="PAINT_Button" onclick="setTool('PAINT')"><img src="assets/fill.png"></button>
            <button id="SELECT_Button" onclick="setTool('SELECT')"><img src="assets/select.png"></button>
          </div>
          <div class="toolbarRow">
            <span id="colorPalette" style="flex-grow: 4;"></span>
            <input type="color" id="colorPicker" value="#ff0000" onchange="setColor(this.value)">
            <button id="EYEDROP_Button" onclick="setTool('EYEDROP')"><img src="assets/eye-dropper.png"></button>
            <button id="paletteButton" onclick="toggleMenu('paletteSettings', this)"><img src="assets/palette.png"></button>
          </div>
        </div>
        <div class="toolbar extraBar" style="display:none;" id="selectionTools">
          <div class="toolbarRow">
            <button onclick="cancelSelection()"><img src="assets/cancel.png"></button>
            <button onclick="groupSelection()"><img src="assets/group.png"></button>
            <button onclick="ungroupSelection()"><img src="assets/ungroup.png"></button>
            <button onclick="duplicateSelection()"><img src="assets/copy.png"></button>
            <!-- <button disabled onclick="rotateSelection(1)"><img src="assets/rotate.png"></button>
            <button disabled onclick="rotateSelection(-1)"><img src="assets/rotate-reverse.png"></button>
            <button disabled><img src="assets/reflect-horizontal.png"></button>
            <button disabled><img src="assets/reflect-vertical.png"></button> -->
            <button onclick="backSelection()"><img src="assets/bottom.png"></button>
            <button onclick="frontSelection()"><img src="assets/top.png"></button>
            <button onclick="eraseSelection()"><img src="assets/erase.png"></button>
            <span id="bezierControls">
              <button id="BEZIER_Button" onclick="setTool('BEZIER')"><img src="assets/location-crosshairs.png"></button>
            </span>
          </div>
        </div>
        <div class="toolbar extraBar" style="display:none;" id="lineTools">
          <div class="toolbarRow">
            <button onclick="decreaseLineWeight()"><img src="assets/minus.png"></button>
            <span id="currentLineWeightSpan"></span>
            <button onclick="increaseLineWeight()"><img src="assets/plus.png"></button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
